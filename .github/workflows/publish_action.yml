name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["pyproject.toml"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: Comfy-Org/publish-node-action@main
        with:
          # The action checks out and git-cleans by default, which would wipe the
          # gitignored web/ bundle we just built. Skip it and publish the built tree.
          skip_checkout: "true"
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
